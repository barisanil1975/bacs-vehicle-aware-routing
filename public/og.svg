<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Subtle accent glow -->
  <defs>
    <radialGradient id="glow" cx="0.9" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#6366f1" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hairline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Top wordmark -->
  <g transform="translate(80, 80)">
    <!-- { } icon -->
    <g transform="translate(0, -2)">
      <path d="M0 8 C-6 8 -8 11 -8 16 V22 C-8 25 -10 27 -13 27 C-10 27 -8 29 -8 32 V38 C-8 43 -6 46 0 46"
            stroke="#6366f1" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M28 8 C34 8 36 11 36 16 V22 C36 25 38 27 41 27 C38 27 36 29 36 32 V38 C36 43 34 46 28 46"
            stroke="#6366f1" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </g>
    <text x="55" y="36" font-family="Inter, sans-serif" font-size="32" font-weight="800"
          fill="#fafafa" letter-spacing="-1">BACS</text>
    <text x="155" y="33" font-family="Inter, sans-serif" font-size="18" font-weight="400"
          fill="#6366f1" letter-spacing="3">// LABS</text>
  </g>

  <!-- Eyebrow -->
  <g transform="translate(80, 200)">
    <rect x="0" y="6" width="60" height="2" fill="#6366f1"/>
    <text x="80" y="14" font-family="Inter, sans-serif" font-size="14" font-weight="500"
          fill="#a3a3a3" letter-spacing="6">CASE 01 · VEHICLE-AWARE ROUTING</text>
  </g>

  <!-- Headline -->
  <g transform="translate(80, 250)">
    <text x="0" y="60" font-family="Inter, sans-serif" font-size="58" font-weight="600"
          fill="#fafafa" letter-spacing="-1.5">
      <tspan x="0" dy="0">Türkiye'de spot araç fiyatı,</tspan>
      <tspan x="0" dy="76" fill="#6366f1" font-style="italic">"km × ₺/km"</tspan>
      <tspan dx="20" fill="#fafafa">değildir.</tspan>
    </text>
  </g>

  <!-- Bottom metrics -->
  <g transform="translate(80, 510)">
    <!-- Metric 1 -->
    <g>
      <text x="0" y="0" font-family="Geist Mono, ui-monospace, monospace" font-size="36" font-weight="600"
            fill="#6366f1">8</text>
      <text x="0" y="30" font-family="Inter, sans-serif" font-size="13" font-weight="500"
            fill="#a3a3a3" letter-spacing="0.5">ARAÇ SINIFI</text>
    </g>

    <!-- Metric 2 -->
    <g transform="translate(180, 0)">
      <text x="0" y="0" font-family="Geist Mono, ui-monospace, monospace" font-size="36" font-weight="600"
            fill="#6366f1">11</text>
      <text x="0" y="30" font-family="Inter, sans-serif" font-size="13" font-weight="500"
            fill="#a3a3a3" letter-spacing="0.5">KGM KORİDORU</text>
    </g>

    <!-- Metric 3 -->
    <g transform="translate(380, 0)">
      <text x="0" y="0" font-family="Geist Mono, ui-monospace, monospace" font-size="36" font-weight="600"
            fill="#6366f1">5</text>
      <text x="0" y="30" font-family="Inter, sans-serif" font-size="13" font-weight="500"
            fill="#a3a3a3" letter-spacing="0.5">KÖPRÜ × 5 SINIF</text>
    </g>

    <!-- Metric 4 -->
    <g transform="translate(560, 0)">
      <text x="0" y="0" font-family="Geist Mono, ui-monospace, monospace" font-size="36" font-weight="600"
            fill="#6366f1">43</text>
      <text x="0" y="30" font-family="Inter, sans-serif" font-size="13" font-weight="500"
            fill="#a3a3a3" letter-spacing="0.5">UNIT TEST</text>
    </g>
  </g>

  <!-- Bottom-right URL -->
  <text x="1120" y="592" font-family="Geist Mono, ui-monospace, monospace" font-size="14" font-weight="500"
        fill="#6366f1" text-anchor="end" letter-spacing="2">labs.barisanil.com</text>

  <!-- Bottom hairline -->
  <rect x="0" y="618" width="1200" height="1" fill="url(#hairline)"/>
</svg>
